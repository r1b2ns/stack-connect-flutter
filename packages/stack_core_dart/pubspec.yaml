name: stack_core_dart
description: "A new Flutter package project."
version: 0.0.1
homepage:
# Never published: consumes the generated FRB binding via a local path
# dependency into the sibling stack-connect-core checkout.
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Localization runtime + the Global*Localizations delegates the apps wire up.
  # The `AppLocalizations` class is generated by `flutter gen-l10n` from the ARB
  # files in lib/l10n (themselves generated from the iOS String Catalog by
  # tool/gen_l10n_from_xcstrings.dart). See l10n.yaml.
  flutter_localizations:
    sdk: flutter
  # Matches the version Flutter 3.44 ships; used by the generated localizations.
  intl: ^0.20.2
  # The generated flutter_rust_bridge binding now lives in the core repo
  # (mirroring the Swift binding) and is consumed via a path dependency reaching
  # into the sibling stack-connect-core checkout. This package re-exports its
  # surface so app code keeps a single `package:stack_core_dart/...` import.
  stack_core_rust:
    path: ../../../../stack-connect-core/bindings/dart/stack_core_rust
  # Pinned to match the Rust runtime crate `flutter_rust_bridge` and the
  # installed `flutter_rust_bridge_codegen` (all 2.12.0). Still a direct dep:
  # hand-written controllers/gateway reference FRB types at runtime.
  flutter_rust_bridge: 2.12.0
  flutter_riverpod: ^2.6.1
  # FRB types crossing the boundary (e.g. the `StackError` error enum) are
  # freezed classes; the annotation is referenced transitively via re-exports.
  freezed_annotation: ^2.4.4
  # Host stores (Dart side of the core's ports). The core owns no persistence;
  # the host owns its accounts list, blob cache and credential secrets.
  flutter_secure_storage: ^9.2.2
  # SQLite for device (mobile) plus the FFI backend for host/desktop & tests.
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # NOTE: build_runner / freezed are intentionally NOT dev-deps here anymore.
  # This package carries no codegen of its own — the freezed classes emitted by
  # flutter_rust_bridge now live in the `stack_core_rust` binding package (core
  # repo), generated there. Riverpod providers remain hand-written with the
  # classic 2.x API (its codegen chain is incompatible with the Dart 3.12
  # analyzer 7.6).
  # Controller unit tests mock `CoreGateway` (the binding boundary) — no dylib,
  # no network.
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Triggers `flutter gen-l10n` on `flutter pub get`, emitting AppLocalizations
  # (lib/src/l10n/app_localizations.dart) from the ARB files per l10n.yaml.
  generate: true

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
